version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: trazabilidad-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trazabilidad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trazabilidad-api
    environment:
      DATABASE_URL: postgresql://postgres:***@postgres:5432/trazabilidad
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
